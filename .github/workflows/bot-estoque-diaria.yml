name: Bot Estoque · Conferência Diária

on:
  # Poll a cada 5 min (mínimo permitido pelo Actions). Pega jobs pendentes
  # da tabela suprimentos_bot_jobs criados pela app.
  schedule:
    - cron: "*/5 * * * *"
  # Disparo manual pela aba Actions (com data opcional).
  workflow_dispatch:
    inputs:
      data_alvo:
        description: "Data alvo (YYYY-MM-DD). Vazio = processa fila."
        required: false
        default: ""

concurrency:
  group: bot-diaria
  cancel-in-progress: false

jobs:
  conferir:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python deps
        working-directory: bot
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity-check dos secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRANSNET_USER: ${{ secrets.TRANSNET_USER }}
          TRANSNET_PASSWORD: ${{ secrets.TRANSNET_PASSWORD }}
          TRANSNET_ALMOXARIFADO: ${{ secrets.TRANSNET_ALMOXARIFADO }}
          TRANSNET_URL: ${{ secrets.TRANSNET_URL }}
        run: |
          ok=true
          for var in SUPABASE_URL SUPABASE_SERVICE_KEY TRANSNET_USER TRANSNET_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Secret $var está vazio. Cadastre em Settings → Secrets and variables → Actions."
              ok=false
            else
              echo "$var: OK"
            fi
          done
          echo "TRANSNET_ALMOXARIFADO: ${TRANSNET_ALMOXARIFADO:-046 (default)}"
          echo "TRANSNET_URL: ${TRANSNET_URL:-default do código}"
          $ok

      - name: Run bot diário
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRANSNET_URL: ${{ secrets.TRANSNET_URL }}
          TRANSNET_USER: ${{ secrets.TRANSNET_USER }}
          TRANSNET_PASSWORD: ${{ secrets.TRANSNET_PASSWORD }}
          TRANSNET_ALMOXARIFADO: ${{ secrets.TRANSNET_ALMOXARIFADO }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          HEADLESS: "true"
          DATA_ALVO_INPUT: ${{ github.event.inputs.data_alvo }}
        run: |
          set -e
          if [ -n "$DATA_ALVO_INPUT" ]; then
            echo "Disparo manual com data_alvo=$DATA_ALVO_INPUT"
            python bot_diaria.py --data-alvo "$DATA_ALVO_INPUT"
          else
            echo "Modo fila (cron)"
            python bot_diaria.py --max-jobs 5
          fi

      - name: Sobe screenshots e CSVs (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-diaria-debug
          path: |
            bot/downloads/*.csv
            bot/downloads/*.png
          if-no-files-found: ignore
          retention-days: 7
