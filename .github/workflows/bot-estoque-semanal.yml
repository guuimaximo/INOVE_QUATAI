name: Bot Estoque · Auditoria Semanal

on:
  # Toda segunda às 06:00 UTC (≈ 03:00 BRT), depois dos dois domingos de contagem.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: bot-semanal
  cancel-in-progress: false

jobs:
  auditar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python deps
        working-directory: bot
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot semanal
        working-directory: bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRANSNET_URL: ${{ secrets.TRANSNET_URL }}
          TRANSNET_USER: ${{ secrets.TRANSNET_USER }}
          TRANSNET_PASSWORD: ${{ secrets.TRANSNET_PASSWORD }}
          TRANSNET_ALMOXARIFADO: ${{ secrets.TRANSNET_ALMOXARIFADO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          HEADLESS: "true"
        run: python bot_semanal.py
