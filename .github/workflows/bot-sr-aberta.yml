name: Bot SR Aberta · Consulta TransNet

on:
  # Disparado pelo INOVE via dispatch-bot Edge Function (tipo: "sr_aberta").
  # Sem cron — a tela do Painel SR comanda a frequencia.
  workflow_dispatch:

concurrency:
  group: bot-sr-aberta
  cancel-in-progress: false

jobs:
  consultar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python deps
        working-directory: bot
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot SR Aberta
        working-directory: bot
        timeout-minutes: 12
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRANSNET_URL: ${{ secrets.TRANSNET_URL }}
          TRANSNET_USER: ${{ secrets.TRANSNET_USER }}
          TRANSNET_PASSWORD: ${{ secrets.TRANSNET_PASSWORD }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          HEADLESS: "true"
        run: python -u bot_sr_aberta.py
